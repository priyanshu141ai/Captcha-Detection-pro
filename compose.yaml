services:
  cipherlens:
    build:
      context: .
    image: cipherlens:local
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      CIPHERLENS_TORCH_THREADS: "${CIPHERLENS_TORCH_THREADS:-2}"
      CIPHERLENS_CONFIDENCE_THRESHOLD: "${CIPHERLENS_CONFIDENCE_THRESHOLD:-0.75}"
    read_only: true
    tmpfs:
      - /tmp:size=64m
    security_opt:
      - no-new-privileges:true
