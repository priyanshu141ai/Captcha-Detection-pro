services:
  cipherlens:
    build:
      context: .
    image: cipherlens:local
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      CIPHERLENS_CONFIG: "${CIPHERLENS_CONFIG:-configs/default.yaml}"
      CIPHERLENS_CHECKPOINT: "${CIPHERLENS_CHECKPOINT:-models/captcha_crnn.pt}"
      CIPHERLENS_TORCH_THREADS: "${CIPHERLENS_TORCH_THREADS:-2}"
      CIPHERLENS_CONFIDENCE_THRESHOLD: "${CIPHERLENS_CONFIDENCE_THRESHOLD:-0.75}"
      CIPHERLENS_MAX_UPLOAD_BYTES: "${CIPHERLENS_MAX_UPLOAD_BYTES:-10485760}"
      CIPHERLENS_MAX_UPLOAD_PIXELS: "${CIPHERLENS_MAX_UPLOAD_PIXELS:-4000000}"
      CIPHERLENS_LOG_LEVEL: "${CIPHERLENS_LOG_LEVEL:-INFO}"
      CIPHERLENS_LOG_FORMAT: "${CIPHERLENS_LOG_FORMAT:-console}"
      CIPHERLENS_API_URL: "${CIPHERLENS_API_URL:-http://127.0.0.1:8000}"
      CIPHERLENS_API_TIMEOUT_SECONDS: "${CIPHERLENS_API_TIMEOUT_SECONDS:-15}"
      CIPHERLENS_LOCAL_FALLBACK: "${CIPHERLENS_LOCAL_FALLBACK:-true}"
    read_only: true
    tmpfs:
      - /tmp:size=64m
    security_opt:
      - no-new-privileges:true
