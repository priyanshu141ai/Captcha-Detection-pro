    architecture: captcha_crnn_positionwise
    version: "1.0"
    lifecycle_status: production_baseline
    checkpoint: models/captcha_crnn.pt
    evaluation_summary: reports/evaluation/evaluation_summary.json
    training_histories: []
    notes: >-
      Only measured baseline; legacy checkpoint training-split provenance is incomplete.

  - id: v2-ctc
    architecture: captcha_crnn_ctc
    version: 2.0-experimental
