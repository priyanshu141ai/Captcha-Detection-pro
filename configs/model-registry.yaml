    evaluation_summary: reports/evaluation/v2/evaluation_summary.json
    training_histories:
      - artifacts/ctc-training-history.json
    notes: >-
      Architecture and safe training path exist; candidate training and evaluation are pending.

  - id: v3-transformer
    architecture: transformer_ocr
    version: deferred
    lifecycle_status: deferred
    checkpoint:
    evaluation_summary:
    training_histories: []
    notes: >-
      Deferred because 1,000 images and no external test set do not justify added complexity.
