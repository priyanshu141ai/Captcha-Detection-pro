runtime:
  checkpoint_path: models/captcha_crnn.pt
  torch_threads: 2
  confidence_threshold: 0.75
  max_upload_bytes: 10485760
  max_upload_pixels: 4000000
  log_level: INFO
  log_format: console

api:
  max_batch_size: 8
  max_inference_concurrency: 1
  base_url: http://127.0.0.1:8000
  request_timeout_seconds: 15.0
  local_fallback_enabled: true

training:
  labels_path: labels.txt
  images_path: data/batch_0
  output_path: models/captcha_crnn_candidate.pt
  history_output_path: artifacts/candidate-training-history.json
  resume_output_path: artifacts/candidate-training-resume.pt
  split_manifest_path: artifacts/split_manifest.csv
  dataset_report_path: artifacts/dataset_report.json
  epochs: 60
  batch_size: 32
  learning_rate: 0.001
  validation_fraction: 0.2
  patience: 15
  seed: 42
  device: auto
  num_workers: 0
  cache_images: true
  deterministic: false
  weight_decay: 0.0001
  gradient_clip_norm: 5.0
  scheduler_factor: 0.5
  scheduler_patience: 4
  mlflow_enabled: false
  mlflow_tracking_uri:
  mlflow_experiment: CipherLens
  mlflow_run_name:

evaluation:
  split_manifest_path: artifacts/split_manifest.csv
  output_path: reports/evaluation
  figures_path: reports/figures
  model_card_path: docs/model-card.md
  split: validation
  batch_size: 32
  device: cpu
  torch_threads: 2
  ece_bins: 10
  latency_warmup: 5
  latency_runs: 50
  temperature_scaling: false

dataset:
  name: cipherlens-repository-dataset
  expected_width: 151
  expected_height: 41
  label_length: 6
  expected_charset: "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz"
  rare_character_threshold: 5
  perceptual_hash_distance: 4
  validation_fraction: 0.2
  split_seed: 42
  artifacts_path: artifacts
  dataset_card_path: docs/dataset-card.md
  sources:
    - name: batch_0
      labels_path: labels.txt
      images_path: data/batch_0
      role: development
      provenance: >-
        Repository-tracked CAPTCHA-style images; exact generation process is not documented.
      authorization: >-
        Supplied by the repository owner for authorized educational use; independent license
        evidence is pending.
    - name: batch_1
      labels_path: requirements2.txt
      images_path: data/batch_1
      role: development
      provenance: >-
        Repository-tracked CAPTCHA-style images; exact generation process is not documented.
      authorization: >-
        Supplied by the repository owner for authorized educational use; independent license
        evidence is pending.
