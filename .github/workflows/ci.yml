name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"
          cache: pip
      - name: Install project and development dependencies
        run: python -m pip install --editable ".[dev]"
      - name: Verify installed dependencies
        run: python -m pip check
      - name: Check formatting
        run: python -m ruff format --check .
      - name: Lint Python sources
        run: python -m ruff check .
      - name: Run practical type checks
        run: python -m mypy
      - name: Compile Python sources
        run: python -m compileall -q app.py train.py src tests scripts
      - name: Reset coverage data
        run: python -m coverage erase
      - name: Run generated-fixture unit tests
        run: python -m coverage run --parallel-mode -m unittest discover -s tests/unit -t . -v
      - name: Run API integration tests
        run: python -m coverage run --parallel-mode -m unittest discover -s tests/integration -t . -v
      - name: Run generated-fixture application tests
        run: >-
          python -m coverage run --parallel-mode -m unittest
          tests.test_app tests.test_training tests.test_validation -v
      - name: Enforce branch coverage floor
        run: python -m coverage combine && python -m coverage report
      - name: Run approved-artifact compatibility smoke when available
        shell: bash
        run: |
          if [[ -f models/captcha_crnn.pt && -d data/batch_0 && -d data/batch_1 ]]; then
            python -m unittest discover -s tests/compatibility -t . -v
            python -m scripts.verify_runtime
          else
            echo "Approved compatibility artifacts are unavailable; fixture-only checks passed."
          fi

  container:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Validate Compose configuration
        run: docker compose config --quiet
      - name: Build and start production stack
        run: docker compose up --build --detach --wait --wait-timeout 180
      - name: Verify running service endpoints
        run: |
          curl --fail --silent --show-error http://127.0.0.1:8000/ready
          curl --fail --silent --show-error http://127.0.0.1:8000/model-info
          curl --fail --silent --show-error http://127.0.0.1:8501/_stcore/health
      - name: Verify non-root identities
        run: |
          test "$(docker compose exec -T api id -u)" = "10001"
          test "$(docker compose exec -T api id -g)" = "10001"
          test "$(docker compose exec -T cipherlens id -u)" = "10001"
          test "$(docker compose exec -T cipherlens id -g)" = "10001"
      - name: Verify CPU-only minimal runtime
        run: |
          docker compose exec -T api python -c "import importlib.metadata as m; import torch; assert torch.version.cuda is None; assert not any(str(d.metadata['Name']).lower().startswith('nvidia-') for d in m.distributions())"
          docker compose exec -T api sh -c 'test ! -e /app/data && test ! -e /app/tests && test "$(find /app/models -maxdepth 1 -type f | wc -l)" -eq 1'
      - name: Verify read-only root and writable temporary storage
        shell: bash
        run: |
          if docker compose exec -T api sh -c "touch /app/write-probe"; then
            echo "Read-only root filesystem check failed."
            exit 1
          fi
          docker compose exec -T api sh -c "touch /tmp/write-probe && rm /tmp/write-probe"
      - name: Verify graceful missing-model state
        shell: bash
        run: |
          docker run --detach --name cipherlens-missing-model \
            --no-healthcheck --read-only --tmpfs /tmp:size=64m --cap-drop ALL \
            --security-opt no-new-privileges \
            --env CIPHERLENS_CHECKPOINT=/app/models/missing.pt \
            --publish 18000:8000 cipherlens:local \
            python -m uvicorn cipherlens.api:app --host 0.0.0.0 --port 8000
          for attempt in {1..30}; do
            health_status="$(curl --silent --output /dev/null --write-out '%{http_code}' http://127.0.0.1:18000/health || true)"
            [[ "$health_status" = "200" ]] && break
            sleep 1
          done
          ready_status="$(curl --silent --output /dev/null --write-out '%{http_code}' http://127.0.0.1:18000/ready || true)"
          test "$health_status" = "200"
          test "$ready_status" = "503"
          test "$(docker inspect --format '{{.State.Running}}' cipherlens-missing-model)" = "true"
      - name: Show container logs after failure
        if: failure()
        run: |
          docker compose logs --no-color
          docker logs cipherlens-missing-model 2>/dev/null || true
      - name: Stop containers
        if: always()
        run: |
          docker rm --force cipherlens-missing-model 2>/dev/null || true
          docker compose down --volumes --remove-orphans
