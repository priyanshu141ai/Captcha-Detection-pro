name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install project and development dependencies
        run: python -m pip install --editable ".[dev]"
      - name: Check formatting
        run: python -m ruff format --check .
      - name: Lint Python sources
        run: python -m ruff check .
      - name: Run practical type checks
        run: python -m mypy
      - name: Compile Python sources
        run: python -m compileall -q app.py train.py src tests scripts
      - name: Run unit and integration tests
        run: python -m unittest discover -s tests -v
      - name: Run checkpoint smoke test
        run: python -m scripts.verify_runtime

  container:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build production image
        run: docker build --tag cipherlens:ci .
